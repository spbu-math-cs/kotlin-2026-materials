name: Check solution

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: check-solution-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks (all modules)
    runs-on: ubuntu-latest

    env:
      # IMPORTANT: keys must match step `id` values.
      # Step ids cannot contain '-', so we use task_01, task_02, ...
      # TEACHER_TODO
      POINTS_JSON: '{"task_01":20,"task_02":40}'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # Warm-up: assemble with a strict timeout.
      - name: Warm-up (assemble)
        id: warm_up
        timeout-minutes: 3
        run: ./gradlew assemble

      # Module checks: independent steps
      # TEACHER_TODO
      - name: task-01 (checks)
        id: task_01
        timeout-minutes: 1
        if: ${{ steps.warm_up.outcome == 'success' && !cancelled() }}
        run: ./gradlew :task-01:test

      # TEACHER_TODO
      - name: task-02 (checks)
        id: task_02
        timeout-minutes: 1
        if: ${{ steps.warm_up.outcome == 'success' && !cancelled() }}
        run: ./gradlew :task-02:test

      # Summary (always runs)
      - name: Build markdown summary
        if: ${{ always() }}
        shell: bash
        env:
          # TEACHER_TODO
          RESULTS_JSON: '{"task_01":"${{ steps.task_01.outcome }}","task_02":"${{ steps.task_02.outcome }}"}'
        run: |
          python3 - <<'PY'
          import json
          import os

          def load_json_env(name: str) -> dict:
            raw = os.environ.get(name, "")
            if not raw:
              return {}
            return json.loads(raw)

          points = load_json_env("POINTS_JSON")
          results = load_json_env("RESULTS_JSON")

          def passed(result: str) -> bool:
            return result == "success"

          rows = []
          total = 0

          # Preserve POINTS_JSON order (Python 3.7+ keeps insertion order)
          for step_id, max_points in points.items():
            res = results.get(step_id, "skipped")
            ok = passed(res)
            got = max_points if ok else 0
            total += got
            rows.append((step_id, str(ok).lower(), f"{got} / {max_points}"))

          out = []
          out.append("## CI results")
          out.append("")
          out.append("| Module | Passed | Points |")
          out.append("|---|---:|---:|")
          out.extend([f"| {m} | {p} | {pts} |" for (m, p, pts) in rows])
          out.append(f"| **Total** |  | **{total}** |")
          out.append("")

          with open('summary.md', 'w', encoding='utf-8') as f:
            f.write("\n".join(out))
          PY

      - name: Comment PR
        if: ${{ always() }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: check-solution
          path: summary.md
